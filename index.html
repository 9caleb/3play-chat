<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3PLAY Live Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- LEFT -->
  <div class="left" id="leftPanel">
    <div class="logo-wrap">
      <img src="3PLAY logo design.png" alt="3PLAY Logo">
    </div>

    <div class="center-group">
      <h1 id="startText">START CHATTING NOW</h1>
      <canvas id="qr"></canvas>
    </div>

    <div class="rules" id="rules">
      <p>🪪 Your name can be entered once only and cannot be changed</p>
      <p>🤝 Be respectful. No rude or offensive words</p>
      <p>🚫 No spamming</p>
      <p>📺 Messages appear live on screen</p>
      <p class="enjoy">🎉 Enjoy the party! <span>#PLAYwithme</span></p>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right" id="rightPanel">
    <div id="chat"></div>

    <div class="input-area" id="inputArea">
      <input id="name" placeholder="Enter your name (one time only)">
      <textarea id="message" placeholder="Type your message"></textarea>
      <button id="sendBtn">SEND</button>
      <button id="clearBtn">CLEAR ALL MSG</button>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
<script src="app.js"></script>

</body>
</html>
