<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3PLAY Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="input">

<h1 class="logo">3PLAY</h1>

<div class="rules">
  <p>🪪 Name can be entered once only</p>
  <p>🤝 Be respectful</p>
  <p>🚫 No spamming</p>
  <p>🎉 Enjoy the party! #PLAYwithme</p>
</div>

<input id="name" placeholder="Your name (one time only)">
<textarea id="msg" placeholder="Your message"></textarea>
<button id="send">SEND</button>

<!-- ADMIN AREA -->
<div id="admin">
  <button id="clear">CLEAR ALL</button>
  <div id="chat"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBMoeGpRpLb8Ooh47WIlKCrCPC7ocZ2ZUo",
  authDomain: "play-chatbox.firebaseapp.com",
  databaseURL: "https://play-chatbox-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "play-chatbox"
});

const db = firebase.database();
const ref = db.ref("messages");

const nameInput = document.getElementById("name");
const msgInput = document.getElementById("msg");
const sendBtn = document.getElementById("send");

/* name lock */
if (localStorage.getItem("name")) {
  nameInput.value = localStorage.getItem("name");
  nameInput.disabled = true;
}

sendBtn.onclick = () => {
  if (!nameInput.value || !msgInput.value) return;
  localStorage.setItem("name", nameInput.value);
  nameInput.disabled = true;
  ref.push({ name: nameInput.value, message: msgInput.value });
  msgInput.value = "";
};

/* admin */
const chat = document.getElementById("chat");
const clearBtn = document.getElementById("clear");

ref.on("child_added", s => {
  const d = s.val();
  const div = document.createElement("div");
  div.id = s.key;
  div.innerHTML = `<b>${d.name}</b>: ${d.message}
    <button onclick="ref.child('${s.key}').remove()">✕</button>`;
  chat.appendChild(div);
});

ref.on("child_removed", s => {
  const el = document.getElementById(s.key);
  if (el) el.remove();
});

clearBtn.onclick = () => ref.remove();
</script>

</body>
</html>
