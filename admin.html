<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3PLAY Admin</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="admin">

<div class="layout">
  <div class="left">
    <div class="logo-wrap">
      <img src="3PLAY logo design.png">
    </div>
  </div>

  <div class="right">
    <div id="chat"></div>

    <div class="input-area admin-input">
      <input id="name" value="ADMIN" disabled>
      <textarea id="message" placeholder="Admin message"></textarea>
      <div class="btn-row">
        <button id="sendBtn">SEND</button>
        <button id="clearBtn" class="danger">CLEAR ALL MESSAGES</button>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="app.js"></script>
<script>
initFirebase();
initAdmin();
</script>
</body>
</html>
